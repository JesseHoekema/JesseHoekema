name: Update README

on:
  push:
  schedule:
    - cron: "0 */6 * * *" # runs every 6 hours

jobs:
  markscribe:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@master

      - name: Render README template
        run: |
          docker run --rm \
            -e GITHUB_TOKEN="${{ secrets.PERSONAL_GITHUB_TOKEN }}" \
            -e WAKATIME_API_KEY="${{ secrets.WAKATIME_API_KEY }}" \
            -e WAKATIME_URL="https://hackatime.hackclub.com/api/v1/" \
            -v "${{ github.workspace }}:/workspace" \
            --workdir /workspace \
            ghcr.io/taciturnaxolotl/markscribe:latest \
            -write README.md templates/README.md.tpl

      - uses: stefanzweifel/git-auto-commit-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit_message: "chore: update README stats 🤖"
          branch: main
          commit_user_name: readme-scribe 🤖
          commit_user_email: actions@github.com
          commit_author: readme-scribe 🤖 <actions@github.com>
